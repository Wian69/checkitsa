<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CheckItSA - Scam & AI Checker</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f2f2f2; }
    h1 { color: #0077cc; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; max-width: 500px; }
    button { background-color: #0077cc; color: white; border: none; cursor: pointer; }
    button:hover { background-color: #005fa3; }
    button.disabled { opacity: 0.5; pointer-events: none; }
    pre { background: #fff; padding: 15px; border: 1px solid #ccc; overflow-x: auto; max-width: 500px; }
  </style>
</head>
<body>
  <h1>CheckItSA - Scam & AI Checker</h1>

  <p>Enter URL, image URL, or base64 content to check:</p>
  <input id="inputContent" type="text" placeholder="Enter URL or base64 content">
  <button id="checkBtn">Check Content</button>

  <pre id="output">Results will appear here</pre>

  <script>
    const WORKER_URL = "https://checkitsa-backend.wiandurandt69.workers.dev";

    // Supabase credentials
    const SUPABASE_URL = "https://jndoazginxmpodmsmvvs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iPpE08OHfbLNJdv9cQOUVg_TBLYiIJD";

    const MAX_FREE_CHECKS = 5;
    let usedChecks = parseInt(localStorage.getItem('usedChecks') || '0');

    const input = document.getElementById('inputContent');
    const btn = document.getElementById('checkBtn');
    const output = document.getElementById('output');

    function updateButton() {
      if (usedChecks >= MAX_FREE_CHECKS) {
        btn.textContent = "Upgrade to continue";
        btn.classList.add('disabled');
      } else {
        btn.textContent = `Check Content (${MAX_FREE_CHECKS - usedChecks} free left)`;
        btn.classList.remove('disabled');
      }
    }

    async function checkContent() {
      if (usedChecks >= MAX_FREE_CHECKS) {
        alert("You reached 5 free checks. Upgrade to continue.");
        return;
      }

      const content = input.value.trim();
      if (!content) return alert("Please enter content");

      output.textContent = "Checking...";

      try {
        // Call Worker
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "url", content, reporter: "anonymous" })
        });

        let result;
        try {
          result = await response.json();
        } catch (e) {
          result = { success: false, error: "Worker returned invalid JSON or empty response" };
        }

        output.textContent = JSON.stringify(result, null, 2);

        // Log to Supabase
        await fetch(`${SUPABASE_URL}/rest/v1/reports`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({
            type: "url",
            content: content,
            reporter: "anonymous",
            result: result,
            created_at: new Date().toISOString()
          })
        });

        // Update free checks
        usedChecks++;
        localStorage.setItem('usedChecks', usedChecks);
        updateButton();

      } catch (err) {
        output.textContent = "Error: " + err.message;
      }
    }

    btn.addEventListener('click', checkContent);
    updateButton();
  </script>
</body>
</html>
