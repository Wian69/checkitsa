<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CheckItSA - Scam & AI Checker</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f2f2f2; }
    h1 { color: #0077cc; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; max-width: 500px; }
    button { background-color: #0077cc; color: white; border: none; cursor: pointer; }
    button:hover { background-color: #005fa3; }
    #output { background: #fff; padding: 15px; border: 1px solid #ccc; max-width: 500px; }
    table { width: 100%; max-width: 600px; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #0077cc; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
    .safe { color: green; font-weight: bold; }
    .warning { color: orange; font-weight: bold; }
    .danger { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>CheckItSA - Scam & AI Checker</h1>

  <p>Enter URL, text, or upload a file to check:</p>
  <input id="inputContent" type="text" placeholder="Enter URL or text content">
  <input id="fileUpload" type="file">
  <button id="checkBtn">Check Content</button>

  <div id="output">Results will appear here</div>

  <h2>Recent Reports</h2>
  <table id="recentReports">
    <thead>
      <tr>
        <th>Content</th>
        <th>AI</th>
        <th>Scam</th>
        <th>Verified</th>
        <th>Report Again</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const WORKER_URL = "https://checkitsa-backend.wiandurandt69.workers.dev";
    const SUPABASE_URL = "https://jndoazginxmpodmsmvvs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iPpE08OHfbLNJdv9cQOUVg_TBLYiIJD";

    const input = document.getElementById('inputContent');
    const fileInput = document.getElementById('fileUpload');
    const btn = document.getElementById('checkBtn');
    const output = document.getElementById('output');
    const recentReportsTable = document.querySelector('#recentReports tbody');

    async function displayResult(result) {
      let html = '';
      html += `<p>AI Check: ${result.is_ai ? '<span class="warning">AI-generated ⚠️</span>' : '<span class="safe">Safe ✅</span>'}</p>`;
      html += `<p>Scam Check: ${result.is_scam ? '<span class="danger">Possible Scam ⚠️</span>' : '<span class="safe">Safe ✅</span>'}</p>`;
      html += `<p>Verified: ${result.verified ? '<span class="safe">Verified ✅</span>' : '<span class="warning">Not Verified ⚠️</span>'}</p>`;
      html += `<p>Reason: ${result.reason}</p>`;
      output.innerHTML = html;
    }

    async function fetchRecentReports() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/reports?select=*&order=created_at.desc&limit=5`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const reports = await res.json();
        recentReportsTable.innerHTML = '';
        reports.forEach(r => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${r.content}</td>
            <td>${r.result.is_ai ? '⚠️ AI' : '✅ Safe'}</td>
            <td>${r.result.is_scam ? '⚠️ Scam' : '✅ Safe'}</td>
            <td>${r.result.verified ? '✅ Verified' : '⚠️ Not Verified'}</td>
            <td><button onclick="reportAgain('${r.content}')">Report Again</button></td>
          `;
          recentReportsTable.appendChild(row);
        });
      } catch (e) {
        console.error("Failed to fetch recent reports", e);
      }
    }

    async function reportAgain(content) {
      try {
        await fetch(`${WORKER_URL}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "url", content, reporter: "anonymous" })
        });
        alert("Reported again successfully!");
        fetchRecentReports();
      } catch (err) {
        alert("Failed to report again: " + err.message);
      }
    }

    async function checkContent() {
      let content = input.value.trim();

      // If a file is uploaded, convert to Base64
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        content = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = error => reject(error);
          reader.readAsDataURL(file);
        });
      }

      if (!content) return alert("Please enter a URL/text or upload a file");

      output.innerHTML = "Checking...";

      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "file", content, reporter: "anonymous" })
        });

        const resultJSON = await response.json();
        if (resultJSON.success) {
          displayResult(resultJSON.data);

          // Log to Supabase
          await fetch(`${SUPABASE_URL}/rest/v1/reports`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation'
            },
            body: JSON.stringify({
              type: "file",
              content: content,
              reporter: "anonymous",
              result: resultJSON.data,
              created_at: new Date().toISOString()
            })
          });

          fetchRecentReports();
        } else {
          output.innerHTML = `<span class="danger">Error: ${resultJSON.error}</span>`;
        }

      } catch (err) {
        output.innerHTML = `<span class="danger">Error: ${err.message}</span>`;
      }
    }

    btn.addEventListener('click', checkContent);
    fetchRecentReports();
  </script>
</body>
</html>
